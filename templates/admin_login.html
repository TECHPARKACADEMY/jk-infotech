{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 30px; background: #f8fafc; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h3 style="color: #002060; margin-top: 0; text-align: center;">JK Corporate Desk Login</h3>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <div style="padding: 10px; background-color: #f8d7da; color: #842029; font-size: 13px; border-radius: 4px; margin-bottom: 15px;">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('admin_login') }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" name="username" placeholder="Enter Username Profile" style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
        <input type="password" name="password" placeholder="Enter Secure Password" style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
        <button type="submit" style="background: #0b63e0; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Access Control Dashboard</button>
    </form>
</div>
{% endblock %}
